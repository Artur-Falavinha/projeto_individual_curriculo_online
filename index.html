    <script>
      (() => {
        const temaSalvo = localStorage.getItem('theme');
        const temaEscuro =
          temaSalvo === 'dark' ||
          (!temaSalvo && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (temaEscuro) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
